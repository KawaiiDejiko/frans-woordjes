    .btn-shuffle {

      color: #e07070;
      font-weight: 700;

    .btn-back {

      font-weight: 700;

    .btn-shuffle:active,

    .results-container {

    }

    function normalize(s) {
      return s.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/^(le |la |les |l'|de |het |een |un |une |des )/i, '')
        .trim();
    }

    function isCorrect(input, answer) {
      const n = normalize(input);
      const a = normalize(answer);
      if (n === a) return true;
      const alts = a.split('/').map(x => x.trim());
      return alts.some(alt => n === alt || alt.includes(n) || n.includes(alt));
    }

    function showScreen(screenName) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.querySelector('.' + screenName + '-screen').classList.add('active');
      state.currentScreen = screenName;
    }

    function getFilteredWords() {
      return WORDS.filter(w => state.settings.categories.has(w.cat));
    }

    function updateWordCount() {
      const filtered = getFilteredWords();
      const maxWords = Math.min(filtered.length, 100);
      document.getElementById('maxWords').textContent = maxWords;
      document.getElementById('sliderValue').textContent = Math.min(state.settings.aantalWoorden, maxWords);
      document.getElementById('wordCount').textContent = `${filtered.length} woorden geselecteerd`;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}m ${secs}s`;
    }

    // ============= LOGIN =============
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const naam = document.getElementById('naam').value;
      const errorEl = document.getElementById('emailError');

      if (!email.endsWith(`@${CONFIG.schoolDomain}`)) {
        errorEl.textContent = `E-mail moet eindigen op @${CONFIG.schoolDomain}`;
        errorEl.classList.add('show');
        return;
      }

      errorEl.classList.remove('show');
      state.user = { email, naam };
      document.getElementById('greetingName').textContent = naam;
      showScreen('setup');
    });

    // ============= SETUP =============
    // Categories
    const categoriesGrid = document.getElementById('categoriesGrid');
    CATEGORIES.forEach(cat => {
      const chip = document.createElement('div');
      chip.className = 'category-chip selected';
      chip.textContent = cat;
      chip.addEventListener('click', () => {
        chip.classList.toggle('selected');
        if (chip.classList.contains('selected')) {
          state.settings.categories.add(cat);
        } else {
          state.settings.categories.delete(cat);
        }
        updateWordCount();
      });
      categoriesGrid.appendChild(chip);
    });

    document.getElementById('selectAllBtn').addEventListener('click', () => {
      CATEGORIES.forEach(cat => state.settings.categories.add(cat));
      document.querySelectorAll('.category-chip').forEach(c => c.classList.add('selected'));
      updateWordCount();
    });

    document.getElementById('deselectAllBtn').addEventListener('click', () => {
      state.settings.categories.clear();
      document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('selected'));
      updateWordCount();
    });

    // Klas buttons
    document.querySelectorAll('[data-klas]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('[data-klas]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.settings.klas = btn.dataset.klas;
      });
    });

    // Richting buttons
    document.querySelectorAll('[data-richting]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('[data-richting]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        state.settings.richting = btn.dataset.richting;
      });
    });

    // Slider
    document.getElementById('wordSlider').addEventListener('input', (e) => {
      state.settings.aantalWoorden = parseInt(e.target.value);
      document.getElementById('sliderValue').textContent = state.settings.aantalWoorden;
    });

    updateWordCount();

    // Start Quiz
    document.getElementById('quizBtn').addEventListener('click', (e) => {
      e.preventDefault();
      if (!state.settings.klas || !state.settings.richting) {
        alert('Kies alsjeblieft je klas en richting');
        return;
      }

      const filtered = getFilteredWords();
      if (filtered.length === 0) {
        alert('Geen woorden geselecteerd');
        return;
      }

      state.quiz.words = filtered.sort(() => Math.random() - 0.5)
        .slice(0, state.settings.aantalWoorden);

      if (state.settings.richting === 'mix') {
        state.quiz.words = state.quiz.words.map(w => ({
          ...w,
          reverse: Math.random() > 0.5,
        }));
      } else if (state.settings.richting === 'nl_fr') {
        state.quiz.words = state.quiz.words.map(w => ({
          ...w,
          reverse: true,
        }));
      }

      state.quiz.currentIndex = 0;
      state.quiz.answers = [];
      state.quiz.startTime = Date.now();
      state.quiz.isAnswered = false;
      showQuizQuestion();
      showScreen('quiz');
    });

    // Start Flashcards
    document.getElementById('flashcardsBtn').addEventListener('click', (e) => {
      e.preventDefault();
      if (!state.settings.klas) {
        alert('Kies alsjeblieft je klas');
        return;
      }

      const filtered = getFilteredWords();
      if (filtered.length === 0) {
        alert('Geen woorden geselecteerd');
        return;
      }

      state.flashcards.words = filtered.sort(() => Math.random() - 0.5)
        .slice(0, state.settings.aantalWoorden);

      if (state.settings.richting === 'mix') {
        state.flashcards.words = state.flashcards.words.map(w => ({
          ...w,
          reverse: Math.random() > 0.5,
        }));
      } else if (state.settings.richting === 'nl_fr') {
        state.flashcards.words = state.flashcards.words.map(w => ({
          ...w,
          reverse: true,
        }));
      }

      state.flashcards.currentIndex = 0;
      state.flashcards.isFront = true;
      showFlashcard();
      showScreen('flashcard');
    });

    // ============= QUIZ =============
    function showQuizQuestion() {
      const word = state.quiz.words[state.quiz.currentIndex];
      const isReverse = word.reverse;
      const fromLang = isReverse ? 'Nederlands' : 'Frans';
      const toLang = isReverse ? 'Frans' : 'Nederlands';
      const questionWord = isReverse ? word.nl : word.fr;
      const correctAnswer = isReverse ? word.fr : word.nl;

      document.getElementById('quizLabel').textContent = `${fromLang} â ${toLang}`;
      document.getElementById('quizWord').textContent = questionWord;
      document.getElementById('quizCounter').textContent = `Vraag ${state.quiz.currentIndex + 1} van ${state.quiz.words.length}`;
      document.getElementById('progressFill').style.width = `${(state.quiz.currentIndex / state.quiz.words.length) * 100}%`;

      const input = document.getElementById('quizInput');
      input.value = '';
      input.className = 'quiz-input';
      input.disabled = false;
      input.focus();

      const feedback = document.getElementById('feedback');
      feedback.classList.remove('show', 'correct', 'wrong');

      const checkBtn = document.getElementById('checkBtn');
      checkBtn.disabled = false;
      checkBtn.textContent = 'Controleer';

      state.quiz.isAnswered = false;
      updateScoreDisplay();
    }

    function updateScoreDisplay() {
      const correct = state.quiz.answers.filter(a => a.correct).length;
      document.getElementById('scoreDisplay').textContent = `Score: ${correct}/${state.quiz.words.length}`;
    }

    document.getElementById('checkBtn').addEventListener('click', checkAnswer);
    document.getElementById('quizInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !state.quiz.isAnswered) checkAnswer();
    });

    function checkAnswer() {
      const input = document.getElementById('quizInput').value.trim();
      const word = state.quiz.words[state.quiz.currentIndex];
      const isReverse = word.reverse;
      const correctAnswer = isReverse ? word.fr : word.nl;

      const correct = isCorrect(input, correctAnswer);
      const feedback = document.getElementById('feedback');
      const inputEl = document.getElementById('quizInput');
      const checkBtn = document.getElementById('checkBtn');

      state.quiz.answers.push({ correct, input, answer: correctAnswer });
      state.quiz.isAnswered = true;

      if (correct) {
        feedback.className = 'feedback show correct';
        feedback.textContent = `â Correct! Het antwoord is: ${correctAnswer}`;
        inputEl.className = 'quiz-input correct';
      } else {
        feedback.className = 'feedback show wrong';
        feedback.textContent = `â Fout. Het juiste antwoord is: ${correctAnswer}`;
        inputEl.className = 'quiz-input wrong';
      }

      checkBtn.disabled = true;
      checkBtn.textContent = state.quiz.currentIndex < state.quiz.words.length - 1 ? 'Volgende â' : 'Resultaten â';
      inputEl.disabled = true;

      updateScoreDisplay();
    }

    // Continue to next question or show results
    document.getElementById('checkBtn').addEventListener('click', function() {
      if (!state.quiz.isAnswered) return;

      if (state.quiz.currentIndex < state.quiz.words.length - 1) {
        state.quiz.currentIndex++;
        showQuizQuestion();
      } else {
        showResults();
      }
    });

    // ============= FLASHCARDS =============
    function showFlashcard() {
      const word = state.flashcards.words[state.flashcards.currentIndex];
      const isReverse = word.reverse;
      const card = document.getElementById('card');

      if (state.flashcards.isFront) {
        const lang = isReverse ? 'Nederlands' : 'Frans';
        const displayWord = isReverse ? word.nl : word.fr;
        card.innerHTML = `
          <div class="card-front">
            <div class="card-front-lang">${lang}</div>
            <div class="card-word">${displayWord}</div>
          </div>
        `;
      } else {
        const lang = isReverse ? 'Frans' : 'Nederlands';
        const translation = isReverse ? word.fr : word.nl;
        card.innerHTML = `
          <div class="card-back">
            <div class="card-back-lang">${lang}</div>
            <div class="card-translation">${translation}</div>
          </div>
        `;
      }

      document.getElementById('flashcardCounter').textContent = `${state.flashcards.currentIndex + 1} van ${state.flashcards.words.length}`;
      document.getElementById('prevBtn').disabled = state.flashcards.currentIndex === 0;
      document.getElementById('nextBtn').disabled = state.flashcards.currentIndex === state.flashcards.words.length - 1;
    }

    document.getElementById('card').addEventListener('click', () => {
      state.flashcards.isFront = !state.flashcards.isFront;
      showFlashcard();
    });

    document.getElementById('prevBtn').addEventListener('click', (e) => {
      e.preventDefault();
      if (state.flashcards.currentIndex > 0) {
        state.flashcards.currentIndex--;
        state.flashcards.isFront = true;
        showFlashcard();
      }
    });

    document.getElementById('nextBtn').addEventListener('click', (e) => {
      e.preventDefault();
      if (state.flashcards.currentIndex < state.flashcards.words.length - 1) {
        state.flashcards.currentIndex++;
        state.flashcards.isFront = true;
        showFlashcard();
      }
    });

    document.getElementById('shuffleBtn').addEventListener('click', (e) => {
      e.preventDefault();
      state.flashcards.words.sort(() => Math.random() - 0.5);
      state.flashcards.currentIndex = 0;
      state.flashcards.isFront = true;
      showFlashcard();
    });

    document.getElementById('backBtn').addEventListener('click', (e) => {
      e.preventDefault();
      showScreen('setup');
    });

    // ============= RESULTS =============
    function showResults() {
      const correct = state.quiz.answers.filter(a => a.correct).length;
      const total = state.quiz.words.length;
      const percentage = Math.round((correct / total) * 100);
      const elapsed = Math.floor((Date.now() - state.quiz.startTime) / 1000);

      document.getElementById('finalScore').textContent = `${correct}/${total}`;
      document.getElementById('finalPercentage').textContent = `${percentage}%`;
      document.getElementById('timeElapsed').textContent = `Tijd: ${formatTime(elapsed)}`;

      const resultsList = document.getElementById('resultsList');
      resultsList.innerHTML = '';

      state.quiz.answers.forEach((answer, idx) => {
        const word = state.quiz.words[idx];
        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `
          <div class="result-question">${idx + 1}. ${answer.answer}</div>
          <div class="result-user-answer">Jouw antwoord: ${answer.input || '(leeg)'}</div>
          <div class="result-correct-answer">Correct: ${answer.answer}</div>
        `;
        resultsList.appendChild(item);
      });

      showScreen('results');
    }

    document.getElementById('saveBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const correct = state.quiz.answers.filter(a => a.correct).length;
      const total = state.quiz.words.length;
      const percentage = Math.round((correct / total) * 100);
      const elapsed = Math.floor((Date.now() - state.quiz.startTime) / 1000);

      const data = {
        email: state.user.email,
        naam: state.user.naam,
        niveau: state.settings.klas,
        score: correct,
        totaal: total,
        percentage: percentage,
        modus: 'Quiz',
        tijdsduur_s: elapsed,
        datum: new Date().toISOString(),
      };

      try {
        const response = await fetch(
          `${CONFIG.supabaseUrl}/rest/v1/${CONFIG.supabaseTable}`,
          {
            method: 'POST',
            headers: {
              'apikey': CONFIG.supabaseKey,
              'Authorization': `Bearer ${CONFIG.supabaseKey}`,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal',
            },
            body: JSON.stringify(data),
          }
        );

        if (response.ok) {
          showScreen('setup');
        } else {
          console.error('Save failed:', response.status);
          alert('Opslaan mislukt, probeer het opnieuw');
        }
      } catch (error) {
        console.error('Save error:', error);
        alert('Opslaan mislukt, probeer het opnieuw');
      }
    });

    document.getElementById('retryBtn').addEventListener('click', (e) => {
      e.preventDefault();
      const filtered = getFilteredWords();
      state.quiz.words = filtered.sort(() => Math.random() - 0.5)
        .slice(0, state.settings.aantalWoorden);

      if (state.settings.richting === 'mix') {
        state.quiz.words = state.quiz.words.map(w => ({
          ...w,
          reverse: Math.random() > 0.5,
        }));
      } else if (state.settings.richting === 'nl_fr') {
        state.quiz.words = state.quiz.words.map(w => ({
          ...w,
          reverse: true,
        }));
      }

      state.quiz.currentIndex = 0;
      state.quiz.answers = [];
      state.quiz.startTime = Date.now();
      state.quiz.isAnswered = false;
      showQuizQuestion();
      showScreen('quiz');
    });
  </script>
</body>
</html>
